<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – MIT-WPU AI Counseling</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .tab-row {
            display: flex;
            border-bottom: 2px solid #e9ecef;
            margin-bottom: 1.5rem;
        }
        .tab-btn {
            flex: 1;
            background: none;
            color: #7f8c8d;
            border: none;
            border-bottom: 3px solid transparent;
            border-radius: 0;
            padding: 0.7rem;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active {
            color: #004d99;
            border-bottom: 3px solid #004d99;
        }
        .tab-btn:hover { background: none; color: #004d99; }
        .success-msg {
            color: #27ae60;
            font-size: 0.9rem;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="logo">🎓 MIT-WPU</div>
        <h1>AI Career Counseling Portal</h1>
    </header>

    <!-- Tabs -->
    <div class="tab-row">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Login Form -->
    <div id="login-form">
        <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="Enter your email" />
        </div>
        <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="Enter your password" />
        </div>
        <button id="login-btn" onclick="login()">Login</button>
        <p class="error-msg" id="login-error">Login failed. Check your credentials or backend connection.</p>
    </div>

    <!-- Signup Form -->
    <div id="signup-form" style="display:none">
        <div class="form-group">
            <label for="signup-name">Full Name <small style="color:#7f8c8d">(min 3 characters)</small></label>
            <input type="text" id="signup-name" placeholder="Enter your full name" minlength="3" />
        </div>
        <div class="form-group">
            <label for="signup-email">Email</label>
            <input type="email" id="signup-email" placeholder="Enter your email" />
        </div>
        <div class="form-group">
            <label for="signup-password">Password</label>
            <input type="password" id="signup-password" placeholder="Min 6 characters" />
        </div>
        <button id="signup-btn" onclick="signup()">Create Account</button>
        <p class="error-msg" id="signup-error">Signup failed. Email may already be in use.</p>
        <p class="success-msg" id="signup-success">✓ Account created! Please login now.</p>
    </div>
</div>

<script>
    const API_BASE = 'http://localhost:8080';

    function switchTab(tab) {
        document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
        document.getElementById('tab-login').classList.toggle('active', tab === 'login');
        document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
    }

    async function login() {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value.trim();
        const errorMsg = document.getElementById('login-error');
        const btn = document.getElementById('login-btn');

        if (!email || !password) {
            errorMsg.textContent = 'Please fill in all fields.';
            errorMsg.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Logging in...';
        errorMsg.style.display = 'none';

        try {
            const res = await fetch(`${API_BASE}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (!res.ok) throw new Error('Login failed');

            const data = await res.json();
            localStorage.setItem('token', data.token);
            window.location.href = 'student-form.html';
        } catch (err) {
            errorMsg.textContent = 'Login failed. Check your credentials or backend connection.';
            errorMsg.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Login';
        }
    }

    async function signup() {
        const name = document.getElementById('signup-name').value.trim();
        const email = document.getElementById('signup-email').value.trim();
        const password = document.getElementById('signup-password').value.trim();
        const errorMsg = document.getElementById('signup-error');
        const successMsg = document.getElementById('signup-success');
        const btn = document.getElementById('signup-btn');

        if (!name || !email || !password) {
            errorMsg.textContent = 'Please fill in all fields.';
            errorMsg.style.display = 'block';
            successMsg.style.display = 'none';
            return;
        }
        if (name.length < 3) {
            errorMsg.textContent = 'Full name must be at least 3 characters.';
            errorMsg.style.display = 'block';
            return;
        }

        if (password.length < 6) {
            errorMsg.textContent = 'Password must be at least 6 characters.';
            errorMsg.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Creating account...';
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';

        try {
            const res = await fetch(`${API_BASE}/api/auth/signup`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });

            const data = await res.json();

            if (!res.ok) {
                // Show actual server validation message
                const serverMsg = Object.values(data)[0];
                errorMsg.textContent = serverMsg || 'Signup failed. Please try again.';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Create Account';
                return;
            }

            successMsg.style.display = 'block';
            btn.textContent = 'Create Account';
            btn.disabled = false;

            // Auto-switch to login after 1.5 seconds
            setTimeout(() => switchTab('login'), 1500);
        } catch (err) {
            errorMsg.textContent = 'Cannot connect to backend. Make sure server is running.';
            errorMsg.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Create Account';
        }
    }
</script>
</body>
</html>
